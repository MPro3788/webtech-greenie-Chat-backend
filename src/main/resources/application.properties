spring.application.name=chat

# Render setzt PORT automatisch – sonst 8080
server.port=${PORT:8080}

# Datenbank: DATABASE_URL wird von Render gesetzt (verknüpfte PostgreSQL-Instanz).
# Lokal: ./run-local.sh lädt DATABASE_URL automatisch über die Render-API.
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.open-in-view=false
