databases:
  - name: webtech-Greenie-Chat-Data
    databaseName: webtech_greenie_chat_data_4895
    plan: free
    region: frankfurt

services:
  - type: web
    name: webtech-greenie-Chat-backend
    runtime: native
    plan: free
    region: frankfurt
    buildCommand: ./gradlew bootJar --no-daemon
    startCommand: java -jar build/libs/*.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: webtech-Greenie-Chat-Data
          property: connectionString
